name: ci-fullstack-workflow

# Ensure the workflow runs on schedule (Sunday at 0:00) and on push to the main branch
on:
  push:
    branches:
      - main 
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at 00:00
  

#Use a matrix strategy to use Node.js versions 16.x and 18.x
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x]
    steps:
      # Check out the code from the repository.
      - name: Check out code
        uses: actions/checkout@v3
      # Set up a Node.js environment using the specified node version.
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Install the dependencies add path to backend and frontend
      - name : Install dependencies
        run: cd backend && npm install
       

      # Run the tests.
      - name: Run tests in backend
        run: cd backend && npm test

      # Run the linter.
      - name: Run linter in backend
        run: cd backend && npm run lint

      # Send a console message at completion.
      
      - name: Send completion message
        run: |
          echo "Hello ${{github.actor}}. You pushed to ${{github.repository}} at $(date)."

        
